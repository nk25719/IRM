<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f4e78">
  <title>CMM Login</title>
  <link rel="stylesheet" href="/static/theme.css">
</head>
<body>
  <main class="login-wrap">
    <section class="card login-card" aria-labelledby="login-title">
      <div class="login-mark" aria-hidden="true">C</div>
      <h1 id="login-title">CMM Portal Login</h1>
      <p>Sign in to access inventory, After Sales, CRM, and administration modules.</p>
      {{ERROR}}
      <form method="post" action="/login">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" name="password" autocomplete="current-password" required>
        </div>
        <button class="btn" type="submit">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
