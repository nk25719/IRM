<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MDManser Data View</title>
  <link rel="stylesheet" href="/static/theme.css">
  <style>
    .data-shell{padding:24px 22px 44px}
    .toolbar{display:grid;grid-template-columns:1.2fr repeat(4,minmax(120px,.5fr));gap:10px;margin:14px 0}
    .toolbar input,.toolbar select{min-height:38px}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0 18px}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:14px 0}
    .metric{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px}
    .metric span{color:var(--muted);display:block;font-size:12px}
    .metric b{color:var(--primary);font-size:22px}
    .tabs{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0}
    .tabs button{border:1px solid var(--line);background:#fff;color:var(--primary-dark);font-weight:800}
    .tabs button.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .table-wrap{overflow:auto;background:#fff;border:1px solid var(--line);border-radius:8px}
    table{border-collapse:collapse;width:100%}
    th,td{border-bottom:1px solid var(--line);font-size:13px;padding:9px;text-align:left;vertical-align:top}
    th{background:var(--soft);color:var(--primary-dark);position:sticky;top:0}
    .muted{color:var(--muted)}
    .badge{background:var(--soft);border-radius:999px;color:var(--primary-dark);display:inline-block;font-weight:800;padding:4px 8px}
    .detail{margin-top:14px}
    pre{background:#111827;color:#e5e7eb;border-radius:8px;max-height:380px;overflow:auto;padding:12px}
    @media(max-width:900px){.toolbar{grid-template-columns:1fr}.data-shell{padding:18px 14px 34px}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1>MDManser Data View</h1>
        <p>Browse imported CMM calendar events and historical service records.</p>
      </div>
      <nav class="top-actions">
        <a href="/portal">Portal</a>
        <a href="/mdmanser">Connector</a>
        <a href="/after-sales">After Sales</a>
        <a href="/logout">Logout</a>
      </nav>
    </div>
  </header>

  <main class="data-shell">
    <section class="summary-grid" id="summary"></section>

    <section class="toolbar" aria-label="MDManser data filters">
      <input id="search" placeholder="Search report, hospital, engineer, serial, model">
      <input id="engineer" placeholder="Engineer">
      <input id="institution" placeholder="Institution">
      <input id="start" type="date" title="Start date">
      <input id="end" type="date" title="End date">
    </section>

    <div class="actions">
      <button id="refresh">Refresh</button>
      <button id="calendarTabButton">Show Calendar Events</button>
      <button id="serviceTabButton">Service Records</button>
      <a class="button-like" href="/mdmanser">Import More</a>
    </div>

    <div class="tabs">
      <button class="active" data-tab="calendar">Calendar Events</button>
      <button data-tab="service">Service History</button>
    </div>

    <section class="table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </section>

    <section class="detail">
      <h2>Selected Row</h2>
      <pre id="detail">{}</pre>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[char]));
    const pretty = (value) => JSON.stringify(value, null, 2);
    let activeTab = "calendar";
    let calendarRows = [];
    let serviceRows = [];

    async function api(path) {
      const res = await fetch(path, { credentials: "same-origin" });
      const text = await res.text();
      let data;
      try { data = text ? JSON.parse(text) : {}; } catch { data = { response_text: text }; }
      if (!res.ok) throw new Error(data.detail || text || res.statusText);
      return data;
    }

    function metric(label, value) {
      return `<article class="metric"><span>${esc(label)}</span><b>${esc(value ?? 0)}</b></article>`;
    }

    async function loadSummary() {
      const data = await api("/api/erp/mdmanser/import-summary");
      $("summary").innerHTML = [
        metric("Service records", data.service_records),
        metric("Calendar events", data.calendar_events),
        metric("Institutions", data.institutions),
        metric("Engineers", data.engineers),
        metric("Suppliers", data.suppliers),
        metric("Models", data.models),
      ].join("");
    }

    function filterParams(base) {
      const params = new URLSearchParams(base || {});
      if ($("search").value) params.set("q", $("search").value);
      if ($("engineer").value) params.set("engineer_name", $("engineer").value);
      if ($("institution").value && activeTab === "service") params.set("institution", $("institution").value);
      if ($("start").value && activeTab === "calendar") params.set("start", $("start").value);
      if ($("end").value && activeTab === "calendar") params.set("end", $("end").value);
      return params;
    }

    async function loadCalendar() {
      const params = filterParams({ limit: "500" });
      calendarRows = await api(`/api/erp/mdmanser/calendar/events?${params.toString()}`);
      renderCalendar();
    }

    async function loadService() {
      const params = filterParams({ limit: "500" });
      serviceRows = await api(`/api/erp/mdmanser/service-records?${params.toString()}`);
      renderService();
    }

    function rowClick(row) {
      $("detail").textContent = pretty(row);
    }

    function renderCalendar() {
      $("tableHead").innerHTML = `<tr><th>Date</th><th>Type</th><th>Engineer</th><th>Title / Reasons</th><th>Contract</th><th>Client</th><th>Equipment</th></tr>`;
      $("tableBody").innerHTML = calendarRows.length ? calendarRows.map((row, index) => `
        <tr data-kind="calendar" data-index="${index}">
          <td>${esc(row.start_date || "")}</td>
          <td><span class="badge">${esc(row.event_type || "")}</span></td>
          <td>${esc(row.engineer_name || "")}</td>
          <td><strong>${esc(row.title || "")}</strong><br><span class="muted">${esc(row.call_reasons || "")}</span></td>
          <td>${esc(row.contract_reference || "")}</td>
          <td>${esc(row.client_name || "")}</td>
          <td>${esc(row.equipment_name || "")}</td>
        </tr>`).join("") : `<tr><td colspan="7" class="muted">No imported calendar events yet. Open Connector and import a month.</td></tr>`;
    }

    function renderService() {
      $("tableHead").innerHTML = `<tr><th>Report</th><th>Call Date</th><th>Visit</th><th>Engineer</th><th>Institution</th><th>Device</th><th>Serial</th><th>Call Type</th></tr>`;
      $("tableBody").innerHTML = serviceRows.length ? serviceRows.map((row, index) => `
        <tr data-kind="service" data-index="${index}">
          <td>${esc(row.report_number || "")}</td>
          <td>${esc(row.call_date || "")}<br><span class="muted">${esc(row.call_time || "")}</span></td>
          <td>${esc(row.visit_date || "")}<br><span class="muted">${esc(row.visit_time || "")}</span></td>
          <td>${esc(row.engineer_name || "")}</td>
          <td>${esc(row.institution || "")}</td>
          <td>${esc([row.product_type, row.model].filter(Boolean).join(" / "))}</td>
          <td>${esc(row.serial_number || "")}</td>
          <td>${esc([row.call_type_1, row.call_type_2].filter(Boolean).join(" / "))}<br><span class="muted">${esc(row.call_reasons || "")}</span></td>
        </tr>`).join("") : `<tr><td colspan="8" class="muted">No MDManser service history imported yet.</td></tr>`;
    }

    function setTab(tab) {
      activeTab = tab;
      document.querySelectorAll(".tabs button").forEach((button) => button.classList.toggle("active", button.dataset.tab === tab));
      if (tab === "calendar") loadCalendar().catch(showError);
      else loadService().catch(showError);
    }

    function showError(error) {
      $("detail").textContent = pretty({ error: error.message || String(error) });
    }

    $("refresh").addEventListener("click", () => Promise.all([loadSummary(), activeTab === "calendar" ? loadCalendar() : loadService()]).catch(showError));
    $("calendarTabButton").addEventListener("click", () => setTab("calendar"));
    $("serviceTabButton").addEventListener("click", () => setTab("service"));
    document.querySelectorAll(".tabs button").forEach((button) => button.addEventListener("click", () => setTab(button.dataset.tab)));
    ["search","engineer","institution","start","end"].forEach((id) => $(id).addEventListener("change", () => setTab(activeTab)));
    $("tableBody").addEventListener("click", (event) => {
      const tr = event.target.closest("tr[data-kind]");
      if (!tr) return;
      rowClick(tr.dataset.kind === "calendar" ? calendarRows[Number(tr.dataset.index)] : serviceRows[Number(tr.dataset.index)]);
    });

    loadSummary().catch(showError);
    setTab("calendar");
  </script>
<script src="/static/app_layout.js"></script>
</body>
</html>
