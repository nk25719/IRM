<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MDManser Calendar Connector</title>
  <link rel="stylesheet" href="/static/theme.css">
  <style>
    .connector-grid{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:start}
    .status-card,.panel{background:#fff;border:1px solid #d8dde6;border-radius:8px;padding:16px}
    .controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}
    .actions button{min-height:38px}
    pre{background:#111827;color:#e5e7eb;border-radius:8px;padding:12px;overflow:auto;max-height:360px}
    .events-table{width:100%;border-collapse:collapse}
    .events-table th,.events-table td{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left;vertical-align:top}
    .muted{color:#6b7280}
    @media(max-width:900px){.connector-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <div>
      <h1>MDManser / CMM Calendar</h1>
      <p>Authenticated read-only calendar import using the current PHP session.</p>
    </div>
    <nav class="top-actions">
      <a href="/portal">Portal</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/logout">Logout</a>
    </nav>
  </header>

  <main class="connector-grid">
    <section class="status-card">
      <h2>Status</h2>
      <p id="statusMessage" class="muted">Not checked yet.</p>
      <dl>
        <dt>Base URL</dt><dd id="baseUrl">-</dd>
        <dt>Configured</dt><dd id="configured">-</dd>
        <dt>Session</dt><dd id="hasSession">-</dd>
      </dl>
      <div class="controls">
        <label>Month<input id="month" type="number" min="1" max="12" value="5"></label>
        <label>Year<input id="year" type="number" min="2000" max="2100" value="2026"></label>
      </div>
      <div class="actions">
        <button id="checkStatus">Check MDManser Status</button>
        <button id="readCalendar">Read Calendar</button>
        <button id="importCalendar">Import Calendar</button>
        <button id="listEvents">List Imported Events</button>
      </div>
    </section>

    <section class="panel">
      <h2>Result</h2>
      <pre id="result">{}</pre>
      <h2>Imported Events</h2>
      <div style="overflow:auto">
        <table class="events-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Engineer</th>
              <th>Title / Reasons</th>
              <th>Contract</th>
              <th>Client</th>
              <th>Equipment</th>
            </tr>
          </thead>
          <tbody id="eventsBody">
            <tr><td colspan="6" class="muted">No events loaded.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const pretty = (value) => JSON.stringify(value, null, 2);
    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[char]));

    function params() {
      return `month=${encodeURIComponent($("month").value)}&year=${encodeURIComponent($("year").value)}`;
    }

    async function api(path, options = {}) {
      const res = await fetch(path, { credentials: "same-origin", ...options });
      const text = await res.text();
      let data;
      try { data = text ? JSON.parse(text) : {}; } catch { data = { response_text: text }; }
      if (!res.ok) {
        $("result").textContent = pretty({ status: res.status, error: data });
        throw new Error(text || res.statusText);
      }
      $("result").textContent = pretty(data);
      return data;
    }

    function renderStatus(data) {
      $("statusMessage").textContent = data.has_session ? "MDManser session is configured." : "MDMANSER_PHPSESSID is not configured.";
      $("baseUrl").textContent = data.base_url || "-";
      $("configured").textContent = data.configured ? "true" : "false";
      $("hasSession").textContent = data.has_session ? "configured" : "missing";
    }

    function renderEvents(rows) {
      $("eventsBody").innerHTML = rows.length ? rows.map((event) => `
        <tr>
          <td>${esc(event.start_date || "")}</td>
          <td>${esc(event.engineer_name || "")}</td>
          <td><strong>${esc(event.title || "")}</strong><br><span class="muted">${esc(event.call_reasons || "")}</span></td>
          <td>${esc(event.contract_reference || "")}</td>
          <td>${esc(event.client_name || "")}</td>
          <td>${esc(event.equipment_name || "")}</td>
        </tr>
      `).join("") : `<tr><td colspan="6" class="muted">No imported events found.</td></tr>`;
    }

    $("checkStatus").addEventListener("click", async () => renderStatus(await api("/api/erp/mdmanser/status")));
    $("readCalendar").addEventListener("click", async () => { await api(`/api/erp/mdmanser/calendar/raw?${params()}`); });
    $("importCalendar").addEventListener("click", async () => { await api(`/api/erp/mdmanser/calendar/import?${params()}`, { method: "POST" }); });
    $("listEvents").addEventListener("click", async () => renderEvents(await api("/api/erp/mdmanser/calendar/events?limit=200")));

    api("/api/erp/mdmanser/status").then(renderStatus).catch(() => {});
    api("/api/erp/mdmanser/calendar/events?limit=50").then(renderEvents).catch(() => {});
  </script>
</body>
</html>
