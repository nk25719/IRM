<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f4e78">
  <title>CMM ERP Module</title>
  <link rel="stylesheet" href="/static/theme.css">
  <style>
    .module-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));margin:18px 0}.module-card h3{color:var(--primary-dark);margin:0 0 8px}.module-card p{color:var(--muted);margin:0 0 12px}.links{display:flex;flex-wrap:wrap;gap:8px}.links a{border:1px solid var(--line);border-radius:10px;color:var(--primary-dark);font-weight:800;padding:8px 10px;text-decoration:none}.links a.primary{background:var(--primary);border-color:var(--primary);color:#fff}.table-wrap{overflow:auto}.table{background:#fff;border:1px solid var(--line);border-collapse:collapse;width:100%}.table th,.table td{border-bottom:1px solid var(--line);font-size:13px;padding:10px;text-align:left}.table th{background:var(--soft);color:var(--primary-dark)}
  </style>
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><div class="brand"><h1 id="title">ERP Module</h1><p id="subtitle">Clean module entry point preserving existing routes</p></div><nav class="top-actions"><a href="/portal">Dashboard</a><a href="/crm">CRM / Clients</a><a href="/after-sales">After Sales</a><a href="/inventory">Database</a><a href="/logout">Logout</a></nav></div></header>
  <main class="container">
    <section class="page-intro"><h2 id="heading">Module</h2><p id="description"></p></section>
    <section id="cards" class="module-grid"></section>
    <section class="card"><h2 id="dataTitle">Available Data</h2><div class="table-wrap"><table class="table"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div></section>
  </main>
  <script>
    const modules={
      "/procurement":{title:"Procurement",description:"Client orders, supplier purchase orders, shipping, reception, missing-item purchasing, and PO exports.",api:"/api/purchase-orders",cards:[["Procurement Workspace","/procurement","CO assignment, PO creation, shipping, and reception"],["PO Export","/api/export","Full Excel export with PO and received items"],["Missing Sales Items","/sales","Create PO for shortages from Sales requests"]]},
      "/equipment-registry":{title:"Equipment Registry",description:"Installed equipment, biomedical profiles, PM assets, risk, calibration, uptime, recall, and compatibility records.",api:"/api/pm-assets",cards:[["PM Assets","/pm/assets","Existing equipment registry route"],["After Sales Equipment","/after-sales/pm-tracking","PM and warranty status"],["Biomedical Reports","/reports","Calibration and equipment-history reports"]]},
      "/financials":{title:"Financials",description:"Invoices, unpaid balances, client order exports, and financial status by hospital.",api:"/api/client-orders",cards:[["Client Orders","/procurement","Client order references and procurement handoff"],["Sales Invoices","/sales","Generate invoices only after delivery"],["CRM Financials","/crm","Client financial overview"]]},
      "/reports":{title:"Reports",description:"Printable, Excel, and PDF exports for inventory, stock movement, service, PM, installation, acceptance, calibration, contract, and equipment history reports.",api:"/api/dashboard",cards:[["Inventory Export","/api/export","Master Excel export"],["Stock Movement Report","/api/stock-movements/export","Excel stock movement report"],["Service Report","/api/biomedical/reports/service-report?format=excel","Service call report"],["PM Report","/api/pm-reports?report=completion","PM completion report"],["Calibration Certificate","/api/biomedical/reports/calibration-certificate?format=pdf","PDF calibration report"],["Contract PDF","/api/biomedical/reports/contract-pdf?format=pdf","Contract PDF export"]]},
      "/admin":{title:"Admin",description:"Configuration, audit trail, import/export safety, and system health.",api:"/api/audit",cards:[["Audit Trail","/inventory","Existing audit module"],["Full Export","/api/export","Backup/export"],["Import","/inventory","Existing append/merge import"]]},
    };
    const esc=v=>String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[s]));
    const cfg=modules[location.pathname]||modules["/reports"];
    title.textContent=cfg.title;heading.textContent=cfg.title;description.textContent=cfg.description;document.title=`CMM ${cfg.title}`;
    cards.innerHTML=cfg.cards.map(([name,path,desc])=>`<article class="card module-card"><h3>${esc(name)}</h3><p>${esc(desc)}</p><div class="links"><a class="primary" href="${esc(path)}">Open</a></div></article>`).join("");
    async function load(){try{const res=await fetch(cfg.api);const json=await res.json();const rows=Array.isArray(json)?json:(json&&typeof json==="object"?[json]:[]);const cols=Array.from(new Set(rows.flatMap(r=>Object.keys(r)))).slice(0,8);thead.innerHTML=`<tr>${cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr>`;tbody.innerHTML=rows.slice(0,20).map(r=>`<tr>${cols.map(c=>`<td>${esc(typeof r[c]==="object"?JSON.stringify(r[c]):r[c])}</td>`).join("")}</tr>`).join("")||`<tr><td>No data yet</td></tr>`}catch(e){tbody.innerHTML=`<tr><td>${esc(e.message)}</td></tr>`}}load();
  </script>
</body>
</html>
