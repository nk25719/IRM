<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f4e78">
  <title>CMM ERP Module</title>
  <link rel="stylesheet" href="/static/theme.css">
  <style>
    .module-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));margin:18px 0}.module-card h3{color:var(--primary-dark);margin:0 0 8px}.module-card p{color:var(--muted);margin:0 0 12px}.links{display:flex;flex-wrap:wrap;gap:8px}.links a{border:1px solid var(--line);border-radius:10px;color:var(--primary-dark);font-weight:800;padding:8px 10px;text-decoration:none}.links a.primary{background:var(--primary);border-color:var(--primary);color:#fff}.table-wrap{overflow:auto}.table{background:#fff;border:1px solid var(--line);border-collapse:collapse;width:100%}.table th,.table td{border-bottom:1px solid var(--line);font-size:13px;padding:10px;text-align:left}.table th{background:var(--soft);color:var(--primary-dark)}.status-note{color:var(--muted);font-size:13px;margin:0 0 12px}
  </style>
</head>
<body>
  <main class="container">
    <section class="page-intro"><h2 id="heading">Module</h2><p id="description"></p></section>
    <section id="cards" class="module-grid"></section>
    <section class="card"><h2 id="dataTitle">Available Data</h2><p class="status-note" id="statusNote">Loading module data...</p><div class="table-wrap"><table class="table"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div></section>
  </main>
  <script>
    const modules={
      "/procurement":{title:"Procurement",description:"Client orders, supplier purchase orders, shipping, reception, missing-item purchasing, and PO exports.",api:"/api/purchase-orders",cards:[["Procurement Workspace","/procurement","CO assignment, PO creation, shipping, and reception"],["PO Export","/api/export","Full Excel export with PO and received items"],["Missing Sales Items","/sales","Create PO for shortages from Sales requests"]]},
      "/equipment-registry":{title:"Equipment Registry",description:"Installed equipment, biomedical profiles, PM assets, risk, calibration, uptime, recall, and compatibility records.",api:"/api/pm-assets",cards:[["PM Assets","/aftersales/pm/assets","Existing equipment registry route"],["Aftermarket Equipment","/aftersales/pm","PM and warranty status"],["Biomedical Reports","/reports","Calibration and equipment-history reports"]]},
      "/finance":{title:"Finance",description:"Invoices, payments, customer balances, supplier balances, and financial status by hospital.",api:"/api/client-orders",cards:[["Finance Dashboard","/finance","Financial overview"],["Invoices","/finance/invoices","Issued and pending invoices"],["Payments","/finance/payments","Payment tracking"],["Customer Balances","/finance/customer-balances","Customer account balances"],["Supplier Balances","/finance/supplier-balances","Supplier balances"]]},
      "/products":{title:"Products",description:"Commercial product catalog and product data used by sales workflows.",api:"/api/commercial/products",cards:[["Product Catalog","/products","Commercial product records"],["Sales Products","/sales/products","Products in the sales workspace"],["Quotations","/sales/quotations","Use product data in quotations"]]},
      "/training-demo":{title:"Training & Demo",description:"Training, demo, and customer enablement activities.",api:"/api/aftermarket/dashboard",cards:[["Training & Demo","/training-demo","Training and demo overview"],["After Sales Operations Training","/aftersales/training-demo","Training activity in Aftermarket"],["Clients","/clients","Review customer training history"]]},
      "/reports":{title:"Reports",description:"Printable, Excel, and PDF exports for warehouse, stock movement, service, PM, installation, acceptance, calibration, contract, and equipment history reports.",api:"/api/dashboard",cards:[["Warehouse Export","/api/export","Master Excel export"],["Stock Movement Report","/api/stock-movements/export","Excel stock movement report"],["Service Report","/api/biomedical/reports/service-report?format=excel","Service call report"],["PM Report","/api/pm-reports?report=completion","PM completion report"],["Calibration Certificate","/api/biomedical/reports/calibration-certificate?format=pdf","PDF calibration report"],["Contract PDF","/api/biomedical/reports/contract-pdf?format=pdf","Contract PDF export"]]},
      "/administration":{title:"Administration",description:"Customers, contacts, users, settings, imports, audit trail, and system health.",api:"/api/audit",cards:[["Administration Dashboard","/administration","Administration overview"],["Customers","/administration/customers","Customer records"],["Contacts","/administration/contacts","Contact records"],["Users","/administration/users","User administration"],["Settings","/administration/settings","System settings"]]},
    };
    const esc=v=>String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[s]));
    const sectionTitles={
      "/finance":"Finance Dashboard",
      "/finance/invoices":"Finance Invoices",
      "/finance/payments":"Finance Payments",
      "/finance/customer-balances":"Finance Customer Balances",
      "/finance/supplier-balances":"Finance Supplier Balances",
      "/administration":"Administration Dashboard",
      "/administration/customers":"Administration Customers",
      "/administration/contacts":"Administration Contacts",
      "/administration/users":"Administration Users",
      "/administration/settings":"Administration Settings",
      "/products":"Products",
      "/training-demo":"Training & Demo",
      "/reports":"Reports"
    };
    const currentPath=location.pathname.replace(/\/$/,"")||"/";
    const routeRoot=location.pathname.startsWith("/finance")?"/finance":location.pathname.startsWith("/administration")?"/administration":location.pathname.startsWith("/training")?"/training-demo":location.pathname;
    const cfg=modules[routeRoot]||modules["/reports"];
    const sectionTitle=sectionTitles[currentPath]||cfg.title;
    document.body.setAttribute("data-page-title",sectionTitle);
    heading.textContent=sectionTitle;description.textContent=cfg.description;document.title=`CMM ${sectionTitle}`;
    cards.innerHTML=cfg.cards.map(([name,path,desc])=>`<article class="card module-card"><h3>${esc(name)}</h3><p>${esc(desc)}</p><div class="links"><a class="primary" href="${esc(path)}">Open ${esc(name)}</a></div></article>`).join("");
    async function load(){try{const res=await fetch(cfg.api,{credentials:"same-origin"});if(res.status===401||res.status===403)throw new Error("Sign in to load live module data.");if(!res.ok)throw new Error(`Unable to load data (${res.status})`);const json=await res.json();const rows=Array.isArray(json)?json:(json&&typeof json==="object"?[json]:[]);const cols=Array.from(new Set(rows.flatMap(r=>Object.keys(r)))).slice(0,8);thead.innerHTML=`<tr>${cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr>`;tbody.innerHTML=rows.slice(0,20).map(r=>`<tr>${cols.map(c=>`<td>${esc(typeof r[c]==="object"?JSON.stringify(r[c]):r[c])}</td>`).join("")}</tr>`).join("")||`<tr><td>No data yet</td></tr>`;statusNote.textContent=`Showing ${Math.min(rows.length,20)} of ${rows.length} records.`}catch(e){statusNote.textContent=e.message;tbody.innerHTML=`<tr><td>${esc(e.message)}</td></tr>`}}load();
  </script>
<script src="/static/app_layout.js"></script>
</body>
</html>
