<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CMM Core List</title>
  <link rel="stylesheet" href="/static/theme.css">
  <style>
    .table-wrap{overflow:auto}.table{background:#fff;border:1px solid var(--line);border-collapse:collapse;width:100%}.table th,.table td{border-bottom:1px solid var(--line);font-size:13px;padding:10px;text-align:left;vertical-align:top}.table th{background:var(--soft);color:var(--primary-dark)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.toolbar a{border:1px solid var(--line);border-radius:8px;color:var(--primary-dark);font-weight:800;padding:8px 10px;text-decoration:none}.toolbar a.primary{background:var(--primary);border-color:var(--primary);color:#fff}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand"><h1 id="title">Core List</h1><p id="subtitle">Biomedical ERP foundation</p></div>
      <nav class="top-actions"><a href="/dashboard">Dashboard</a><a href="/crm">Clients</a><a href="/portal">Portal</a><a href="/logout">Logout</a></nav>
    </div>
  </header>
  <main class="container">
    <section class="page-intro"><h2 id="heading">Records</h2><p id="description"></p></section>
    <div class="toolbar"><a class="primary" href="/crm">Clients</a><a href="/departments">Departments</a><a href="/equipment">Equipment</a><a href="/cases">Cases</a></div>
    <section class="card table-wrap"><table class="table"><thead id="thead"></thead><tbody id="tbody"></tbody></table></section>
  </main>
  <script>
    const configs={
      "/departments":{title:"Departments",description:"Hospital departments linked to clients.",api:"/api/departments",cols:["id","client_id","department_name","floor_location","main_contact_name","phone","email"]},
      "/equipment":{title:"Equipment",description:"Installed equipment linked to clients and departments.",api:"/api/equipment",cols:["id","client_name","department_name","asset_tag","serial_number","manufacturer","model","status","warranty_status"]},
      "/cases":{title:"Cases",description:"Central operational cases with parent references.",api:"/api/cases",cols:["id","parent_case_reference","case_no","case_type","client_id","workflow_state","status","priority","updated_at"]}
    };
    const cfg=configs[location.pathname]||configs["/cases"];
    const esc=v=>String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[s]));
    title.textContent=cfg.title;heading.textContent=cfg.title;description.textContent=cfg.description;document.title=`CMM ${cfg.title}`;
    async function load(){const res=await fetch(cfg.api);const rows=await res.json();thead.innerHTML=`<tr>${cfg.cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr>`;tbody.innerHTML=rows.map(r=>`<tr>${cfg.cols.map(c=>`<td>${esc(r[c])}</td>`).join("")}</tr>`).join("")||`<tr><td colspan="${cfg.cols.length}">No records yet.</td></tr>`}
    load();
  </script>
</body>
</html>
