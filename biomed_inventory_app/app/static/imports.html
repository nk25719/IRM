<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Imports</title>
  <link rel="stylesheet" href="/static/theme.css">
  <style>
    .toolbar{align-items:center;display:flex;flex-wrap:wrap;gap:8px}.toolbar input,.toolbar select,.toolbar button,.mapping select{border:1px solid var(--line);border-radius:8px;font:inherit;padding:9px}.toolbar button{background:var(--primary);border-color:var(--primary);color:#fff;cursor:pointer;font-weight:800}.toolbar button.secondary{background:#fff;color:var(--primary-dark)}.mapping{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin-top:14px}.field{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px}.field label{color:var(--muted);display:block;font-size:12px;font-weight:800;margin-bottom:5px}.summary{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin:14px 0}.metric{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:12px}.metric span{color:var(--muted);display:block;font-size:12px}.metric b{color:var(--primary-dark);font-size:20px}.table-wrap{overflow:auto}.table{border-collapse:collapse;width:100%}.table th,.table td{border-bottom:1px solid var(--line);font-size:12px;padding:8px;text-align:left;vertical-align:top}.table th{background:var(--soft);color:var(--primary-dark)}.badge{border-radius:999px;display:inline-block;font-size:12px;font-weight:800;padding:4px 8px}.good{background:#dcfce7;color:#166534}.bad{background:#fee2e2;color:#991b1b}.warn{background:#fff7cc;color:#854d0e}.muted{color:var(--muted);font-size:12px}
  </style>
</head>
<body data-page-title="Admin Imports">
  <main class="container">
    <section class="card">
      <div class="section-title">
        <div><h1>Bulk Import</h1><p class="muted">Upload CSV/XLSX, map columns, validate, then confirm. Existing matches are skipped, not overwritten.</p></div>
        <div class="toolbar"><a class="button-like" href="/admin/database-map">Database Map</a><a class="button-like" href="/admin/query">Reports</a></div>
      </div>
      <div class="toolbar">
        <select id="target"></select>
        <input id="file" type="file" accept=".csv,.xlsx,.xls,.xlsm">
        <button onclick="preview(false)">Upload & Preview</button>
        <button class="secondary" onclick="preview(true)" id="remap" disabled>Re-validate Mapping</button>
        <button onclick="confirmImport()" id="confirm" disabled>Confirm Import</button>
      </div>
      <div id="mapping" class="mapping"></div>
      <div id="summary" class="summary"></div>
    </section>
    <section class="card">
      <h3>Preview Rows</h3>
      <div class="table-wrap"><table class="table" id="previewTable"></table></div>
    </section>
    <section class="card">
      <h3>Import Batches</h3>
      <div class="table-wrap"><table class="table" id="history"></table></div>
    </section>
  </main>
  <script>
    let targets={}, current=null;
    const esc=v=>String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[s]));
    const badge=(v,cls)=>`<span class="badge ${cls||(String(v).includes("error")?"bad":String(v).includes("valid")?"good":"warn")}">${esc(v)}</span>`;
    async function api(url,opts){const res=await fetch(url,opts);if(!res.ok)throw new Error(await res.text());return res.json()}
    function metric(k,v){return `<div class="metric"><span>${esc(k)}</span><b>${esc(v)}</b></div>`}
    function selectedMapping(){const out={};mapping.querySelectorAll("select").forEach(s=>{if(s.value)out[s.dataset.field]=s.value});return out}
    function renderMapping(){const cfg=targets[target.value];const cols=current?.columns||[];const map=current?.mapping||{};mapping.innerHTML=cfg.fields.map(f=>`<div class="field"><label>${esc(f)}${cfg.required.includes(f)?" *":""}</label><select data-field="${esc(f)}"><option value="">Not mapped</option>${cols.map(c=>`<option value="${esc(c)}" ${map[f]===c?"selected":""}>${esc(c)}</option>`).join("")}</select></div>`).join("")}
    function renderRows(rows){const cols=["row_no","status","action","errors",...Object.keys(rows[0]?.mapped||{})];previewTable.innerHTML=`<thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${c==="status"?badge(r.status):c==="errors"?esc((r.errors||[]).join("; ")):esc(r[c]??r.mapped?.[c]??"")}</td>`).join("")}</tr>`).join("")}</tbody>`}
    async function preview(useMapping){const form=new FormData();form.append("target",target.value);form.append("file",file.files[0]);if(useMapping)form.append("mapping_json",JSON.stringify(selectedMapping()));current=await api("/api/admin/imports/preview",{method:"POST",body:form});summary.innerHTML=metric("Batch",current.batch_id)+metric("Rows",current.summary.total_rows)+metric("Valid",current.summary.valid_rows)+metric("Errors",current.summary.error_rows);renderMapping();renderRows(current.rows);remap.disabled=false;confirm.disabled=current.summary.valid_rows<1;await loadHistory()}
    async function confirmImport(){if(!current)return;const data=await api(`/api/admin/imports/${current.batch_id}/confirm`,{method:"POST"});alert(`Saved ${data.saved_rows} row(s), skipped ${data.skipped_rows}.`);confirm.disabled=true;await loadHistory()}
    async function loadTargets(){targets=await api("/api/admin/import-targets");target.innerHTML=Object.keys(targets).map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join("");renderMapping()}
    async function loadHistory(){const rows=await api("/api/admin/imports");history.innerHTML=`<thead><tr><th>ID</th><th>Target</th><th>File</th><th>Status</th><th>Total</th><th>Valid</th><th>Errors</th><th>Saved</th><th>Created</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.id}</td><td>${esc(r.target_table)}</td><td>${esc(r.filename)}</td><td>${badge(r.status)}</td><td>${r.total_rows}</td><td>${r.valid_rows}</td><td>${r.error_rows}</td><td>${r.saved_rows||0}</td><td>${esc(r.created_at)}</td></tr>`).join("")}</tbody>`}
    loadTargets();loadHistory();
  </script>
  <script src="/static/app_layout.js"></script>
</body>
</html>
